services:
  tools:
    - name: "suka_secret"
      addr: "localhost:50100"
      method: "她不做任何有用的事情。但她在。"
      input_schema: |
        {
          "type": "object",
          "data": {}
        }
      output_schema: |
        {
          "type": "object",
          "data": {
            "message": { "type": "string" }
          }
        }

    - name: "echo"
      addr: "localhost:50101"
      method: "原样返回输入内容，用于验证调用链"
      input_schema: |
        {
          "type": "object",
          "data": {
            "content": { "type": "string", "default": "" }
          },
          "required": ["content"]
        }
      output_schema: |
        {
          "type": "object",
          "data": {
            "content": { "type": "string" }
          }
        }

    - name: "ping"
      addr: "localhost:50102"
      method: "测试目标地址的网络连通性"
      input_schema: |
        {
          "type": "object",
          "data": {
            "host":    { "type": "string" },
            "count":   { "type": "integer", "default": 4, "min": 1, "max": 10 },
            "timeout": { "type": "integer", "default": 3000 }
          },
          "required": ["host"]
        }
      output_schema: |
        {
          "type": "object",
          "data": {
            "host":        { "type": "string" },
            "reachable":   { "type": "boolean" },
            "latency_ms":  { "type": "number" },
            "packet_loss": { "type": "number" }
          }
        }

    - name: "fetch"
      addr: "localhost:50103"
      method: "抓取任意 URL 的内容（网页/API/文件），返回原始 HTML 或 JSON"
      input_schema: |
        {
          "type": "object",
          "data": {
            "url":     { "type": "string" },
            "method":  { "type": "string",  "default": "GET", "enum": ["GET","POST","HEAD"] },
            "headers": { "type": "object" },
            "body":    { "type": "string",  "default": "" },
            "limit":   { "type": "integer", "default": 8000, "min": 100, "max": 50000 }
          },
          "required": ["url"]
        }
      output_schema: |
        {
          "type": "object",
          "data": {
            "url":         { "type": "string" },
            "status_code": { "type": "integer" },
            "headers":     { "type": "object" },
            "body":        { "type": "string" },
            "truncated":   { "type": "boolean" },
            "error":       { "type": "string" }
          }
        }

    - name: "cmd"
      addr: "localhost:50104"
      method: "在本地执行命令行操作。只允许只读/编译类命令（go build/run/test、cat/dir/ls、git 查看类）。严格禁止：文件删除、权限修改、密码操作、网络下载、系统配置变更。"
      input_schema: |
        {
          "type": "object",
          "data": {
            "command": { "type": "string" },
            "dir":     { "type": "string",  "default": "" },
            "timeout": { "type": "integer", "default": 30, "min": 1, "max": 120 }
          },
          "required": ["command"]
        }
      output_schema: |
        {
          "type": "object",
          "data": {
            "command":   { "type": "string" },
            "dir":       { "type": "string" },
            "stdout":    { "type": "string" },
            "stderr":    { "type": "string" },
            "exit_code": { "type": "integer" },
            "blocked":   { "type": "boolean" },
            "error":     { "type": "string" }
          }
        }

    - name: "registry"
      addr: "localhost:50105"
      method: "读取或修改 registry.yaml 中的 skill 列表。add 时可等待新 skill 端口上线后再写入，避免注册未启动的服务。"
      input_schema: |
        {
          "type": "object",
          "data": {
            "action":       { "type": "string", "enum": ["list","add","remove","update"] },
            "name":         { "type": "string",  "default": "" },
            "wait_online":  { "type": "boolean", "default": true },
            "wait_timeout": { "type": "integer", "default": 30, "min": 5, "max": 120 },
            "tool": {
              "type": "object",
              "data": {
                "name":          { "type": "string" },
                "addr":          { "type": "string" },
                "method":        { "type": "string" },
                "input_schema":  { "type": "string" },
                "output_schema": { "type": "string" }
              }
            }
          },
          "required": ["action"]
        }
      output_schema: |
        {
          "type": "object",
          "data": {
            "action":  { "type": "string" },
            "tools":   { "type": "array" },
            "changed": { "type": "boolean" },
            "error":   { "type": "string" }
          }
        }

    - name: "codegen"
      addr: "localhost:50106"
      method: "根据参数描述生成新 skill 的 Go 样板代码并写入 TOOLS_DIR/<n>/main.go。生成的代码包含完整结构和 TODO 注释，指示需要填写的核心逻辑。生成后需用 cmd skill 执行 go build 验证，再用 cmd skill 启动进程，最后用 registry skill 注册。"
      input_schema: |
        {
          "type": "object",
          "data": {
            "name":          { "type": "string" },
            "port":          { "type": "integer" },
            "description":   { "type": "string" },
            "input_fields":  { "type": "array" },
            "output_fields": { "type": "array" },
            "logic_hints":   { "type": "array" }
          },
          "required": ["name", "port", "description"]
        }
      output_schema: |
        {
          "type": "object",
          "data": {
            "name":      { "type": "string" },
            "file_path": { "type": "string" },
            "code":      { "type": "string" },
            "error":     { "type": "string" }
          }
        }

  hubs:
    - name: "suka-eva-hub"
      addr: "localhost:50051"
      registered_at: "2024-01-01T00:00:00Z"

# ── 连接池参数 ─────────────────────────────────────────────
pool:
  grpc_conn:
    min_size:             1
    max_size:             5
    idle_buffer_factor:   0.55
    survive_time_sec:     180
    monitor_interval_sec: 6
    max_retries:          3
    retry_interval_ms:    200
    reconnect_on_get:     false